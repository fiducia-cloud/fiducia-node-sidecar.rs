# Build and push the service container image on push to main.
name: docker
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          build-args: |
            INTERFACES_SHA=5f2c5279ee19941024455b2843256872485bac82
          push: true
          tags: |
            ghcr.io/fiducia-cloud/fiducia-node-sidecar:latest
            ghcr.io/fiducia-cloud/fiducia-node-sidecar:${{ github.sha }}
